<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기아 직관 캘린더 🐯</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; padding: 1rem; }
.app { max-width: 480px; margin: 0 auto; background: white; border-radius: 16px; padding: 1.25rem; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid #eee; }
.team-badge { background: #c8102e; color: white; font-weight: 600; font-size: 14px; padding: 6px 14px; border-radius: 8px; }
.header-title { font-size: 15px; font-weight: 600; color: #111; }
.header-sub { font-size: 12px; color: #999; margin-top: 2px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; display: inline-block; margin-right: 5px; }
.status-dot.on { background: #22c55e; }
.nick-card { background: #f9f9f9; border-radius: 12px; border: 1px solid #eee; padding: 1rem; margin-bottom: 1.25rem; }
.nick-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.nick-row input { flex: 1; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; padding: 7px 10px; outline: none; }
.nick-row input:focus { border-color: #c8102e; }
.nick-btn { background: #c8102e; color: white; border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; font-weight: 600; white-space: nowrap; }
.invite-row { display: flex; align-items: center; gap: 8px; }
.invite-label { font-size: 12px; color: #888; }
.invite-code { font-family: monospace; font-size: 13px; font-weight: 700; background: #e8f0fe; color: #1a56db; padding: 3px 10px; border-radius: 6px; letter-spacing: 2px; }
.invite-tip { font-size: 11px; color: #aaa; margin-top: 5px; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-nav button { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 13px; color: #333; }
.cal-nav button:hover { background: #f5f5f5; }
.cal-title { font-size: 15px; font-weight: 600; color: #111; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.dow { text-align: center; font-size: 11px; color: #999; padding: 4px 0; font-weight: 600; }
.dow:first-child { color: #c8102e; }
.dow:last-child { color: #1a56db; }
.day { border-radius: 8px; border: 1px solid transparent; padding: 5px 4px; min-height: 58px; cursor: pointer; }
.day:hover { background: #f5f5f5; }
.day.empty { pointer-events: none; }
.day.has-game { border-color: #eee; background: #fafafa; }
.day.has-game:hover { border-color: #c8102e44; }
.day.today { border-color: #1a56db !important; background: #e8f0fe !important; }
.day.selected { border-color: #c8102e !important; background: rgba(200,16,46,0.05) !important; }
.day-num { font-size: 11px; font-weight: 600; color: #888; }
.day.today .day-num { color: #1a56db; }
.sun .day-num { color: #c8102e; }
.sat .day-num { color: #1a56db; }
.gtag { margin-top: 3px; font-size: 9px; background: #c8102e; color: white; border-radius: 4px; padding: 2px 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gtag.away { background: #888; }
.dots { display: flex; gap: 2px; flex-wrap: wrap; margin-top: 3px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: #22c55e; }
.panel { background: #f9f9f9; border-radius: 12px; border: 1px solid #eee; margin-top: 1.25rem; overflow: hidden; }
.panel-hdr { padding: 1rem; border-bottom: 1px solid #eee; }
.panel-title { font-size: 14px; font-weight: 600; color: #111; }
.panel-game { font-size: 12px; color: #777; margin-top: 2px; }
.panel-body { padding: 1rem; }
.abtn { background: #c8102e; color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 600; margin-bottom: 1rem; }
.abtn:hover { background: #a00d26; }
.abtn.cancel { background: none; border: 1px solid #ddd; color: #666; }
.abtn.cancel:hover { background: #f5f5f5; }
.abtn:disabled { opacity: 0.5; cursor: default; }
.att-label { font-size: 12px; color: #777; margin-bottom: 6px; }
.att-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 1rem; }
.chip { background: #dcfce7; color: #166534; border-radius: 99px; padding: 3px 10px; font-size: 11px; font-weight: 500; }
.chat-wrap { border-top: 1px solid #eee; padding-top: 1rem; }
.chat-label { font-size: 12px; font-weight: 600; color: #777; margin-bottom: 8px; }
.chat-msgs { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; min-height: 40px; }
.cmsg { display: flex; gap: 7px; align-items: flex-start; }
.cav { width: 24px; height: 24px; border-radius: 50%; background: #e8f0fe; color: #1a56db; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.cav.me { background: rgba(200,16,46,0.1); color: #c8102e; }
.cbubble { background: white; border-radius: 8px; padding: 5px 9px; font-size: 12px; color: #222; max-width: 85%; border: 1px solid #eee; }
.cname { font-size: 10px; color: #aaa; margin-bottom: 2px; }
.cinput-row { display: flex; gap: 6px; }
.cinput-row input { flex: 1; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; padding: 7px 10px; outline: none; }
.cinput-row input:focus { border-color: #c8102e; }
.csend { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 7px 12px; font-size: 13px; cursor: pointer; color: #333; }
.csend:hover { background: #f5f5f5; }
.locked { font-size: 12px; color: #aaa; text-align: center; padding: 1rem; border: 1px dashed #ddd; border-radius: 8px; }
.muted { font-size: 12px; color: #aaa; padding: 4px 0 1rem; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="team-badge">KIA</div>
    <div>
      <div class="header-title">기아 타이거즈 직관 캘린더 🐯</div>
      <div class="header-sub"><span class="status-dot" id="sd"></span><span id="st">연결 중...</span></div>
    </div>
  </div>

  <div class="nick-card">
    <div class="nick-row" id="nickRow">
      <input type="text" id="nickInput" placeholder="닉네임 입력..." maxlength="8" />
      <button class="nick-btn" onclick="setNick()">시작 🐯</button>
    </div>
    <div class="invite-row">
      <span class="invite-label">그룹 코드</span>
      <span class="invite-code">TIGERS27</span>
    </div>
    <div class="invite-tip">이 코드를 아는 친구들만 같이 써요</div>
  </div>

  <div class="cal-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span class="cal-title" id="calTitle"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="panel" id="dayPanel" style="display:none;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbYi5nL6Fb3OEYxT82lK1hhDkmJN8U35s",
  authDomain: "kia-tigers-54803.firebaseapp.com",
  projectId: "kia-tigers-54803",
  storageBucket: "kia-tigers-54803.firebasestorage.app",
  messagingSenderId: "765707436596",
  appId: "1:765707436596:web:ad3562cbfa56ca8d724061"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const GAMES = {
  "2026-06-03":{"away":false,"opp":"삼성","time":"18:30"},
  "2026-06-05":{"away":false,"opp":"한화","time":"18:30"},
  "2026-06-06":{"away":false,"opp":"한화","time":"14:00"},
  "2026-06-07":{"away":false,"opp":"한화","time":"14:00"},
  "2026-06-09":{"away":true,"opp":"두산","time":"18:30"},
  "2026-06-10":{"away":true,"opp":"두산","time":"18:30"},
  "2026-06-12":{"away":false,"opp":"롯데","time":"18:30"},
  "2026-06-13":{"away":false,"opp":"롯데","time":"14:00"},
  "2026-06-14":{"away":false,"opp":"롯데","time":"14:00"},
  "2026-06-17":{"away":true,"opp":"KT","time":"18:30"},
  "2026-06-18":{"away":true,"opp":"KT","time":"18:30"},
  "2026-06-19":{"away":true,"opp":"KT","time":"18:30"},
  "2026-06-20":{"away":false,"opp":"NC","time":"14:00"},
  "2026-06-21":{"away":false,"opp":"NC","time":"14:00"},
  "2026-06-23":{"away":false,"opp":"SSG","time":"18:30"},
  "2026-06-24":{"away":false,"opp":"SSG","time":"18:30"},
  "2026-06-25":{"away":false,"opp":"SSG","time":"18:30"},
  "2026-06-27":{"away":true,"opp":"키움","time":"18:30"},
  "2026-06-28":{"away":true,"opp":"키움","time":"14:00"},
  "2026-07-01":{"away":false,"opp":"LG","time":"18:30"},
  "2026-07-02":{"away":false,"opp":"LG","time":"18:30"},
  "2026-07-03":{"away":false,"opp":"LG","time":"18:30"},
  "2026-07-05":{"away":true,"opp":"삼성","time":"14:00"},
  "2026-07-07":{"away":false,"opp":"두산","time":"18:30"},
  "2026-07-08":{"away":false,"opp":"두산","time":"18:30"},
  "2026-07-09":{"away":false,"opp":"두산","time":"18:30"},
  "2026-07-11":{"away":true,"opp":"한화","time":"18:30"},
  "2026-07-12":{"away":true,"opp":"한화","time":"14:00"},
  "2026-07-14":{"away":false,"opp":"KT","time":"18:30"},
  "2026-07-15":{"away":false,"opp":"KT","time":"18:30"},
  "2026-07-16":{"away":false,"opp":"KT","time":"18:30"},
};

let curYear=2026, curMonth=5, selectedDate=null, myNick="", calData={}, chatUnsub=null;
const DOW=["일","월","화","수","목","금","토"];
function dk(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

document.getElementById('sd').className='status-dot on';
document.getElementById('st').textContent='실시간 연결됨';

function subscribeMonth(y,m){
  const days=new Date(y,m+1,0).getDate();
  for(let d=1;d<=days;d++){
    const key=dk(y,m,d);
    if(!GAMES[key])continue;
    onSnapshot(doc(db,'games',key),snap=>{
      calData[key]=snap.exists()?snap.data():{attendees:[]};
      renderCal();
      if(selectedDate===key)renderPanel(key);
    });
  }
}

window.setNick=function(){
  const v=document.getElementById('nickInput').value.trim();
  if(!v)return;
  myNick=v;
  const nr=document.getElementById('nickRow');
  nr.style.opacity='0.5'; nr.style.pointerEvents='none';
  subscribeMonth(curYear,curMonth);
  if(selectedDate)renderPanel(selectedDate);
};

document.getElementById('nickInput').addEventListener('keydown',e=>{if(e.key==='Enter')window.setNick();});

window.changeMonth=function(d){
  curMonth+=d;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  calData={};
  if(myNick)subscribeMonth(curYear,curMonth);
  renderCal();
  document.getElementById('dayPanel').style.display='none';
  selectedDate=null;
};

function renderCal(){
  document.getElementById('calTitle').textContent=`${curYear}년 ${curMonth+1}월`;
  const g=document.getElementById('calGrid');
  g.innerHTML='';
  DOW.forEach(d=>{const e=document.createElement('div');e.className='dow';e.textContent=d;g.appendChild(e);});
  const today=new Date();
  const first=new Date(curYear,curMonth,1).getDay();
  const days=new Date(curYear,curMonth+1,0).getDate();
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='day empty';g.appendChild(e);}
  for(let d=1;d<=days;d++){
    const key=dk(curYear,curMonth,d);
    const game=GAMES[key];
    const data=calData[key];
    const dow=new Date(curYear,curMonth,d).getDay();
    const isToday=today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===d;
    const el=document.createElement('div');
    let cls='day';
    if(dow===0)cls+=' sun';
    if(dow===6)cls+=' sat';
    if(game)cls+=' has-game';
    if(isToday)cls+=' today';
    if(selectedDate===key)cls+=' selected';
    el.className=cls;
    el.innerHTML=`<div class="day-num">${d}</div>`;
    if(game){
      el.innerHTML+=`<div class="gtag${game.away?' away':''}">${game.away?'@':'vs'}${game.opp}</div>`;
      const atts=data?.attendees||[];
      if(atts.length)el.innerHTML+=`<div class="dots">${atts.map(()=>'<div class="dot"></div>').join('')}</div>`;
    }
    el.onclick=()=>{selectedDate=key;renderCal();renderPanel(key);};
    g.appendChild(el);
  }
}

function renderPanel(key){
  const game=GAMES[key];
  const panel=document.getElementById('dayPanel');
  panel.style.display='block';
  const data=calData[key]||{attendees:[]};
  const isAtt=myNick&&data.attendees.includes(myNick);
  const [y,m,d]=key.split('-');
  const ds=`${parseInt(m)}월 ${parseInt(d)}일`;
  const gi=game?(game.away?'원정 @ ':'vs ')+game.opp+' · '+game.time:'경기 없음';

  let aBtn='';
  if(!game) aBtn=`<div class="muted">이 날은 기아 경기가 없어요</div>`;
  else if(!myNick) aBtn=`<div class="muted">닉네임을 설정하면 참여 표시할 수 있어요</div>`;
  else aBtn=isAtt
    ?`<button class="abtn cancel" id="abtn" onclick="window.toggleAttend('${key}')">✕ 취소할게요</button>`
    :`<button class="abtn" id="abtn" onclick="window.toggleAttend('${key}')">⚾ 직관 갈게요!</button>`;

  const atts=data.attendees||[];
  const attList=atts.length
    ?`<div class="att-label">직관 가는 멤버 <strong>${atts.length}명</strong></div><div class="att-chips">${atts.map(a=>`<div class="chip">✓ ${a}</div>`).join('')}</div>`:'';

  let chatHtml='';
  if(!myNick||!isAtt){
    chatHtml=`<div class="chat-wrap"><div class="locked">🔒 직관 참여자만 채팅할 수 있어요</div></div>`;
  } else {
    chatHtml=`<div class="chat-wrap">
      <div class="chat-label">💬 직관 채팅</div>
      <div class="chat-msgs" id="chatMsgs"><div style="font-size:12px;color:#aaa">채팅 불러오는 중...</div></div>
      <div class="cinput-row">
        <input type="text" id="chatInput" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter')window.sendChat('${key}')" />
        <button class="csend" onclick="window.sendChat('${key}')">전송</button>
      </div>
    </div>`;
  }

  panel.innerHTML=`<div class="panel-hdr"><div class="panel-title">${ds}</div><div class="panel-game">${game?'⚾ ':''} ${gi}</div></div><div class="panel-body">${aBtn}${attList}${chatHtml}</div>`;
  if(myNick&&isAtt)subscribeChat(key);
}

window.toggleAttend=async function(key){
  if(!myNick)return;
  const btn=document.getElementById('abtn');
  if(btn)btn.disabled=true;
  const ref=doc(db,'games',key);
  const snap=await getDoc(ref);
  let atts=snap.exists()?(snap.data().attendees||[]):[];
  const idx=atts.indexOf(myNick);
  if(idx===-1)atts.push(myNick); else atts.splice(idx,1);
  await setDoc(ref,{attendees:atts},{merge:true});
};

function subscribeChat(key){
  if(chatUnsub){chatUnsub();chatUnsub=null;}
  const q=query(collection(db,'games',key,'chats'),orderBy('ts'));
  chatUnsub=onSnapshot(q,snap=>{
    const el=document.getElementById('chatMsgs');
    if(!el)return;
    if(snap.empty){el.innerHTML='<div style="font-size:12px;color:#aaa">아직 채팅이 없어요. 먼저 말 걸어보세요!</div>';return;}
    el.innerHTML=snap.docs.map(d=>{
      const c=d.data();
      const isMe=c.name===myNick;
      return `<div class="cmsg"><div class="cav${isMe?' me':''}">${c.name.slice(0,2)}</div><div><div class="cname">${c.name}</div><div class="cbubble">${c.text}</div></div></div>`;
    }).join('');
    el.scrollTop=el.scrollHeight;
  });
}

window.sendChat=async function(key){
  if(!myNick)return;
  const input=document.getElementById('chatInput');
  const text=input?.value.trim();
  if(!text)return;
  input.value='';
  await addDoc(collection(db,'games',key,'chats'),{name:myNick,text,ts:serverTimestamp()});
};

renderCal();
</script>
</body>
</html>
