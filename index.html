<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기아 직관 캘린더 🐯</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }
#startScreen {
  min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(180deg, #0a0f1e 0%, #1a0a0a 100%); padding: 2rem;
}
.logo-wrap { margin-bottom: 3rem; text-align: center; }
.logo-text { margin-top: 1rem; font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 3px; }
.start-card { width: 100%; max-width: 360px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 2rem; }
.start-card h2 { font-size: 16px; font-weight: 600; color: white; margin-bottom: 6px; text-align: center; }
.start-card p { font-size: 12px; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 1.5rem; }
.input-group { margin-bottom: 1rem; }
.input-group label { font-size: 12px; color: rgba(255,255,255,0.5); display: block; margin-bottom: 6px; }
.start-input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 12px 14px; font-size: 14px; color: white; outline: none; transition: border-color 0.2s; }
.start-input::placeholder { color: rgba(255,255,255,0.25); }
.start-input:focus { border-color: #c8102e; }
.start-btn { width: 100%; background: #c8102e; color: white; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s; }
.start-btn:hover { background: #a00d26; }
.start-btn:disabled { opacity: 0.5; cursor: default; }
.error-msg { font-size: 12px; color: #ff6b6b; text-align: center; margin-top: 10px; min-height: 18px; }
#mainApp { display: none; }
.app { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; }
.app-header { background: #0a0f1e; padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
.app-header-badge { background: #c8102e; color: white; font-weight: 700; font-size: 12px; padding: 4px 10px; border-radius: 6px; }
.app-header-title { font-size: 14px; font-weight: 600; color: white; }
.app-header-nick { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 1px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 4px; }
.app-body { padding: 1rem; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-nav button { background: none; border: 1px solid #e5e7eb; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 13px; color: #333; }
.cal-nav button:hover { background: #f5f5f5; }
.cal-title { font-size: 15px; font-weight: 700; color: #111; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.dow { text-align: center; font-size: 11px; color: #aaa; padding: 4px 0; font-weight: 600; }
.dow:first-child { color: #c8102e; }
.dow:last-child { color: #1a56db; }
.day { border-radius: 8px; border: 1px solid transparent; padding: 5px 4px; min-height: 58px; cursor: pointer; }
.day:hover { background: #f9fafb; }
.day.empty { pointer-events: none; }
.day.has-game { border-color: #f0f0f0; background: #fafafa; }
.day.has-game:hover { border-color: #c8102e44; }
.day.today { border-color: #1a56db !important; background: #eff6ff !important; }
.day.selected { border-color: #c8102e !important; background: rgba(200,16,46,0.05) !important; }
.day-num { font-size: 11px; font-weight: 600; color: #999; }
.day.today .day-num { color: #1a56db; }
.sun .day-num { color: #c8102e; }
.sat .day-num { color: #1a56db; }
.gtag { margin-top: 3px; font-size: 9px; background: #c8102e; color: white; border-radius: 4px; padding: 2px 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gtag.away { background: #888; }
.dots { display: flex; gap: 2px; flex-wrap: wrap; margin-top: 3px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: #22c55e; }
.panel { background: #f9f9f9; border-radius: 12px; border: 1px solid #eee; margin-top: 1rem; overflow: hidden; }
.panel-hdr { padding: 1rem; border-bottom: 1px solid #eee; }
.panel-title { font-size: 14px; font-weight: 700; color: #111; }
.panel-game { font-size: 12px; color: #777; margin-top: 2px; }
.panel-body { padding: 1rem; }
.abtn { background: #c8102e; color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 600; margin-bottom: 1rem; }
.abtn:hover { background: #a00d26; }
.abtn.cancel { background: none; border: 1px solid #ddd; color: #666; }
.abtn.cancel:hover { background: #f5f5f5; }
.abtn:disabled { opacity: 0.5; cursor: default; }
.att-label { font-size: 12px; color: #777; margin-bottom: 6px; }
.att-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 1rem; }
.chip { background: #dcfce7; color: #166534; border-radius: 99px; padding: 3px 10px; font-size: 11px; font-weight: 500; }
.chat-wrap { border-top: 1px solid #eee; padding-top: 1rem; }
.chat-label { font-size: 12px; font-weight: 600; color: #777; margin-bottom: 8px; }
.chat-msgs { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; min-height: 40px; }
.cmsg { display: flex; gap: 7px; align-items: flex-start; }
.cav { width: 24px; height: 24px; border-radius: 50%; background: #e8f0fe; color: #1a56db; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.cav.me { background: rgba(200,16,46,0.1); color: #c8102e; }
.cbubble { background: white; border-radius: 8px; padding: 5px 9px; font-size: 12px; color: #222; max-width: 85%; border: 1px solid #eee; }
.cname { font-size: 10px; color: #aaa; margin-bottom: 2px; }
.cinput-row { display: flex; gap: 6px; }
.cinput-row input { flex: 1; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; padding: 7px 10px; outline: none; }
.cinput-row input:focus { border-color: #c8102e; }
.csend { background: #c8102e; border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; color: white; font-weight: 600; }
.locked { font-size: 12px; color: #aaa; text-align: center; padding: 1rem; border: 1px dashed #ddd; border-radius: 8px; }
.muted { font-size: 12px; color: #aaa; padding: 4px 0 1rem; }
</style>
</head>
<body>

<script type="module">

import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  "2026-08-09":{"away":true,"opp":"LG","time":"18:00"},
  "2026-08-11":{"away":false,"opp":"삼성","time":"18:30"},
  "2026-08-12":{"away":false,"opp":"삼성","time":"18:30"},
  "2026-08-13":{"away":false,"opp":"삼성","time":"18:30"},
  "2026-08-14":{"away":false,"opp":"두산","time":"18:30"},
  "2026-08-15":{"away":false,"opp":"두산","time":"18:00"},
};

let curYear=2026, curMonth=5, selectedDate=null, myNick="", calData={}, chatUnsub=null, myChannel="";
const DOW=["일","월","화","수","목","금","토"];
function dk(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function showError(msg){ document.getElementById('errorMsg').textContent = msg; }

async function handleStart() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  const nick = document.getElementById('nickInput').value.trim();
  if (!code) { showError('초대코드를 입력해주세요'); return; }
  if (!nick) { showError('닉네임을 입력해주세요'); return; }
  const channel = VALID_CODES[code];
  if (!channel) { showError('올바르지 않은 초대코드예요 🚫'); return; }
  showError('확인 중...');
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  try {
    const nickRef = doc(db, 'channels', channel, 'nicknames', nick);
    const nickSnap = await getDoc(nickRef);
    if (nickSnap.exists()) {
      showError('이미 사용 중인 닉네임이에요. 다른 닉네임을 써주세요 🙏');
      btn.disabled = false;
      return;
    }
    await setDoc(nickRef, { createdAt: serverTimestamp() });
    myNick = nick;
    myChannel = channel;
    localStorage.setItem('kia_session', JSON.stringify({ nick, channel }));
    document.getElementById('nickDisplay').textContent = myNick + '님 환영해요!';
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    subscribeMonth(curYear, curMonth);
    renderCal();
  } catch(e) {
    showError('오류가 발생했어요. 다시 시도해주세요.');
    btn.disabled = false;
  }
}

document.getElementById('startBtn').addEventListener('click', handleStart);
document.getElementById('nickInput').addEventListener('keydown', e => { if(e.key==='Enter') handleStart(); });
document.getElementById('codeInput').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('nickInput').focus(); });

// 자동 로그인
const saved = localStorage.getItem('kia_session');
if (saved) {
  try {
    const { nick, channel } = JSON.parse(saved);
    myNick = nick;
    myChannel = channel;
    document.getElementById('nickDisplay').textContent = myNick + '님 환영해요!';
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    subscribeMonth(curYear, curMonth);
    renderCal();
  } catch(e) { localStorage.removeItem('kia_session'); }
}
document.getElementById('prevBtn').addEventListener('click', () => changeMonth(-1));
document.getElementById('nextBtn').addEventListener('click', () => changeMonth(1));

function subscribeMonth(y,m){
  const days=new Date(y,m+1,0).getDate();
  for(let d=1;d<=days;d++){
    const key=dk(y,m,d);
    if(!GAMES[key])continue;
    onSnapshot(doc(db,'channels',myChannel,'games',key),snap=>{
      calData[key]=snap.exists()?snap.data():{attendees:[]};
      renderCal();
      if(selectedDate===key)renderPanel(key);
    });
  }
}

function changeMonth(d){
  curMonth+=d;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  calData={};
  subscribeMonth(curYear,curMonth);
  renderCal();
  document.getElementById('dayPanel').style.display='none';
  selectedDate=null;
}

function renderCal(){
  document.getElementById('calTitle').textContent=`${curYear}년 ${curMonth+1}월`;
  const g=document.getElementById('calGrid');
  g.innerHTML='';
  DOW.forEach(d=>{const e=document.createElement('div');e.className='dow';e.textContent=d;g.appendChild(e);});
  const today=new Date();
  const first=new Date(curYear,curMonth,1).getDay();
  const days=new Date(curYear,curMonth+1,0).getDate();
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='day empty';g.appendChild(e);}
  for(let d=1;d<=days;d++){
    const key=dk(curYear,curMonth,d);
    const game=GAMES[key];
    const data=calData[key];
    const dow=new Date(curYear,curMonth,d).getDay();
    const isToday=today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===d;
    const el=document.createElement('div');
    let cls='day';
    if(dow===0)cls+=' sun';
    if(dow===6)cls+=' sat';
    if(game)cls+=' has-game';
    if(isToday)cls+=' today';
    if(selectedDate===key)cls+=' selected';
    el.className=cls;
    el.innerHTML=`<div class="day-num">${d}</div>`;
    if(game){
      el.innerHTML+=`<div class="gtag${game.away?' away':''}">${game.away?'@':'vs'}${game.opp}</div>`;
      const atts=data?.attendees||[];
      if(atts.length)el.innerHTML+=`<div class="dots">${atts.map(()=>'<div class="dot"></div>').join('')}</div>`;
    }
    el.addEventListener('click',()=>{selectedDate=key;renderCal();renderPanel(key);});
    g.appendChild(el);
  }
}

function renderPanel(key){
  const game=GAMES[key];
  const panel=document.getElementById('dayPanel');
  panel.style.display='block';
  const data=calData[key]||{attendees:[]};
  const isAtt=data.attendees.includes(myNick);
  const [y,m,d]=key.split('-');
  const ds=`${parseInt(m)}월 ${parseInt(d)}일`;
  const gi=game?(game.away?'원정 @ ':'vs ')+game.opp+' · '+game.time:'경기 없음';

  let aBtn='';
  if(!game) aBtn=`<div class="muted">이 날은 기아 경기가 없어요</div>`;
  else aBtn=isAtt
    ?`<button class="abtn cancel" id="abtn">✕ 취소할게요</button>`
    :`<button class="abtn" id="abtn">⚾ 직관 갈게요!</button>`;

  const atts=data.attendees||[];
  const attList=atts.length
    ?`<div class="att-label">직관 가는 멤버 <strong>${atts.length}명</strong></div><div class="att-chips">${atts.map(a=>`<div class="chip">✓ ${a}</div>`).join('')}</div>`:'';

  let chatHtml='';
  if(!isAtt){
    chatHtml=`<div class="chat-wrap"><div class="locked">🔒 직관 참여자만 채팅할 수 있어요</div></div>`;
  } else {
    chatHtml=`<div class="chat-wrap">
      <div class="chat-label">💬 직관 채팅</div>
      <div class="chat-msgs" id="chatMsgs"><div style="font-size:12px;color:#aaa">채팅 불러오는 중...</div></div>
      <div class="cinput-row">
        <input type="text" id="chatInput" placeholder="메시지 입력..." />
        <button class="csend" id="sendBtn">전송</button>
      </div>
    </div>`;
  }

  panel.innerHTML=`<div class="panel-hdr"><div class="panel-title">${ds}</div><div class="panel-game">${game?'⚾ ':''} ${gi}</div></div><div class="panel-body">${aBtn}${attList}${chatHtml}</div>`;

  const abtn = document.getElementById('abtn');
  if(abtn) abtn.addEventListener('click', () => toggleAttend(key));

  const sendBtn = document.getElementById('sendBtn');
  if(sendBtn) sendBtn.addEventListener('click', () => sendChat(key));

  const chatInput = document.getElementById('chatInput');
  if(chatInput) chatInput.addEventListener('keydown', e => { if(e.key==='Enter') sendChat(key); });

  if(isAtt) subscribeChat(key);
}

async function toggleAttend(key){
  const btn=document.getElementById('abtn');
  if(btn)btn.disabled=true;
  const ref=doc(db,'channels',myChannel,'games',key);
  const snap=await getDoc(ref);
  let atts=snap.exists()?(snap.data().attendees||[]):[];
  const idx=atts.indexOf(myNick);
  if(idx===-1)atts.push(myNick); else atts.splice(idx,1);
  await setDoc(ref,{attendees:atts},{merge:true});
}

function subscribeChat(key){
  if(chatUnsub){chatUnsub();chatUnsub=null;}
  const q=query(collection(db,'channels',myChannel,'games',key,'chats'),orderBy('ts'));
  chatUnsub=onSnapshot(q,snap=>{
    const el=document.getElementById('chatMsgs');
    if(!el)return;
    if(snap.empty){el.innerHTML='<div style="font-size:12px;color:#aaa">아직 채팅이 없어요. 먼저 말 걸어보세요!</div>';return;}
    el.innerHTML=snap.docs.map(d=>{
      const c=d.data();
      const isMe=c.name===myNick;
      return `<div class="cmsg"><div class="cav${isMe?' me':''}">${c.name.slice(0,2)}</div><div><div class="cname">${c.name}</div><div class="cbubble">${c.text}</div></div></div>`;
    }).join('');
    el.scrollTop=el.scrollHeight;
  });
}

async function sendChat(key){
  const input=document.getElementById('chatInput');
  const text=input?.value.trim();
  if(!text)return;
  input.value='';
  await addDoc(collection(db,'channels',myChannel,'games',key,'chats'),{name:myNick,text,ts:serverTimestamp()});
}
</script>
</body>
</html>
