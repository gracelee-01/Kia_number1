<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더그아웃 — 기아 직관 캘린더 🐯</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --kia-red: #c8102e;
  --kia-red-dark: #a00d26;
  --kia-navy: #0a1628;
  --gold: #f59e0b;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; background: #f5f5f5; min-height: 100vh; }

/* ───── 시작(로그인/방 선택) 화면 ───── */
#startScreen {
  min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(180deg, #0a0f1e 0%, #1a0a0a 100%); padding: 2rem;
}
.logo-wrap { margin-bottom: 2.5rem; text-align: center; }
.logo-text { margin-top: 1rem; font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 3px; }
.start-card { width: 100%; max-width: 360px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 2rem; }
.start-card h2 { font-size: 16px; font-weight: 600; color: white; margin-bottom: 6px; text-align: center; }
.start-card p { font-size: 12px; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 1.5rem; line-height: 1.5; }
.input-group { margin-bottom: 1rem; }
.input-group label { font-size: 12px; color: rgba(255,255,255,0.5); display: block; margin-bottom: 6px; }
.start-input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 12px 14px; font-size: 14px; color: white; outline: none; transition: border-color 0.2s; }
.start-input::placeholder { color: rgba(255,255,255,0.25); }
.start-input:focus { border-color: var(--kia-red); }
.start-btn { width: 100%; background: var(--kia-red); color: white; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s; }
.start-btn:hover { background: var(--kia-red-dark); }
.start-btn:disabled { opacity: 0.5; cursor: default; }
.ghost-btn { width: 100%; background: none; color: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 0.6rem; transition: background 0.2s; }
.ghost-btn:hover { background: rgba(255,255,255,0.06); }
.kakao-btn { width:100%; background:#FEE500; color:#191919; border:none; border-radius:10px; padding:13px; font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:background 0.2s; }
.kakao-btn:hover { background:#e6cf00; }
.error-msg { font-size: 12px; color: #ff6b6b; text-align: center; margin-top: 12px; min-height: 18px; }
.back-link { background:none; border:none; color: rgba(255,255,255,0.35); font-size: 12px; cursor: pointer; margin-top: 14px; display: block; width: 100%; text-align: center; }
.back-link:hover { color: rgba(255,255,255,0.6); }
.privacy-note { font-size: 11px; color: rgba(255,255,255,0.3); text-align: center; margin-top: 14px; line-height: 1.6; }

/* ───── 메인 앱 ───── */
#mainApp { display: none; }
.app { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; padding-bottom: 84px; }
.app-header { background: var(--kia-navy); padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
.app-header-badge { background: var(--kia-red); color: white; font-weight: 700; font-size: 12px; padding: 4px 10px; border-radius: 6px; }
.app-header-info { flex: 1; min-width: 0; }
.app-header-title { font-size: 14px; font-weight: 600; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.app-header-nick { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 1px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 4px; }
.code-pill { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18); color: rgba(255,255,255,0.8); font-size: 11px; font-weight: 700; letter-spacing: 2px; padding: 5px 10px; border-radius: 8px; cursor: pointer; }
.code-pill:hover { background: rgba(255,255,255,0.16); }
.app-body { padding: 1rem; }

/* 캘린더 */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-nav button { background: none; border: 1px solid #e5e7eb; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 13px; color: #333; }
.cal-nav button:hover { background: #f5f5f5; }
.cal-title { font-size: 15px; font-weight: 700; color: #111; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.dow { text-align: center; font-size: 11px; color: #aaa; padding: 4px 0; font-weight: 600; }
.dow:first-child { color: var(--kia-red); }
.dow:last-child { color: #1a56db; }
.day { border-radius: 8px; border: 1px solid transparent; padding: 5px 4px; min-height: 58px; cursor: pointer; }
.day:hover { background: #f9fafb; }
.day.empty { pointer-events: none; }
.day.has-game { border-color: #f0f0f0; background: #fafafa; }
.day.has-game:hover { border-color: rgba(200,16,46,0.27); }
.day.today { border-color: #1a56db !important; background: #eff6ff !important; }
.day.selected { border-color: var(--kia-red) !important; background: rgba(200,16,46,0.05) !important; }
.day-num { font-size: 11px; font-weight: 600; color: #999; }
.day.today .day-num { color: #1a56db; }
.sun .day-num { color: var(--kia-red); }
.sat .day-num { color: #1a56db; }
.gtag { margin-top: 3px; font-size: 9px; background: var(--kia-red); color: white; border-radius: 4px; padding: 2px 4px; white-space: normal; word-break: keep-all; line-height: 1.3; }
.gtag.away { background: #888; }
.gtag.special { background: var(--gold); }
.dots { display: flex; gap: 2px; flex-wrap: wrap; margin-top: 3px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: #22c55e; }

/* 경기 패널 */
.panel { background: #f9f9f9; border-radius: 12px; border: 1px solid #eee; margin-top: 1rem; overflow: hidden; }
.panel-hdr { padding: 1rem; border-bottom: 1px solid #eee; }
.panel-title { font-size: 14px; font-weight: 700; color: #111; }
.panel-game { font-size: 12px; color: #777; margin-top: 2px; }
.panel-body { padding: 1rem; }
.abtn { background: var(--kia-red); color: white; border: none; border-radius: 8px; padding: 9px 16px; font-size: 13px; cursor: pointer; font-weight: 600; margin-bottom: 1rem; }
.abtn:hover { background: var(--kia-red-dark); }
.abtn.cancel { background: none; border: 1px solid #ddd; color: #666; }
.abtn.cancel:hover { background: #f5f5f5; }
.abtn:disabled { opacity: 0.5; cursor: default; }
.att-label { font-size: 12px; color: #777; margin-bottom: 6px; }
.att-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 1rem; }
.chip { background: #dcfce7; color: #166534; border-radius: 99px; padding: 3px 10px; font-size: 11px; font-weight: 500; }
.muted { font-size: 12px; color: #aaa; padding: 4px 0 1rem; }

/* 채팅 */
.chat-wrap { border-top: 1px solid #eee; padding-top: 1rem; }
.chat-label { font-size: 12px; font-weight: 600; color: #777; margin-bottom: 8px; }
.chat-msgs { max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; min-height: 40px; }
.cmsg { display: flex; gap: 7px; align-items: flex-start; }
.cav { width: 24px; height: 24px; border-radius: 50%; background: #e8f0fe; color: #1a56db; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.cav.me { background: rgba(200,16,46,0.1); color: var(--kia-red); }
.cbubble { background: white; border-radius: 8px; padding: 5px 9px; font-size: 12px; color: #222; max-width: 85%; border: 1px solid #eee; word-break: break-word; }
.cname { font-size: 10px; color: #aaa; margin-bottom: 2px; }
.cinput-row { display: flex; gap: 6px; }
.cinput-row input { flex: 1; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; outline: none; }
.cinput-row input:focus { border-color: var(--kia-red); }
.csend { background: var(--kia-red); border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; color: white; font-weight: 600; }
.locked { font-size: 12px; color: #aaa; text-align: center; padding: 1rem; border: 1px dashed #ddd; border-radius: 8px; }

/* ───── 티켓팅 도우미 ───── */
.ticket-fab {
  position: fixed; left: 50%; transform: translateX(-50%); bottom: 18px;
  width: calc(100% - 2rem); max-width: 448px;
  background: var(--kia-navy); color: white; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px; padding: 13px 16px; font-size: 14px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 8px 24px rgba(10,22,40,0.35); z-index: 20;
}
.ticket-fab:hover { background: #101f38; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 30; display: none; align-items: flex-end; justify-content: center; }
.modal-bg.open { display: flex; }
.modal {
  width: 100%; max-width: 480px; background: var(--kia-navy); border-radius: 20px 20px 0 0;
  padding: 1.5rem 1.25rem 2rem; color: white;
}
.modal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 20px; cursor: pointer; padding: 4px; }
.clock-box { text-align: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 1.5rem 1rem; margin-bottom: 1rem; }
.clock-date { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 8px; }
.clock-time { font-size: 42px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 1px; line-height: 1; }
.clock-ms { font-size: 22px; font-weight: 700; color: var(--kia-red); font-variant-numeric: tabular-nums; }
.clock-note { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 10px; line-height: 1.6; }
.tl-btn { width: 100%; background: var(--kia-red); color: white; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; }
.tl-btn:hover { background: var(--kia-red-dark); }

/* 토스트 */
#toast { position: fixed; left: 50%; transform: translateX(-50%); bottom: 90px; background: #222; color: white; font-size: 13px; padding: 10px 18px; border-radius: 99px; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 50; }
#toast.show { opacity: 1; }
</style>
</head>

<!-- ═════════ 시작 화면 ═════════ -->
<div id="startScreen">
  <div class="logo-wrap">
    <svg width="200" viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg" aria-label="KIA TIGERS">

<!-- ═════════ 메인 앱 ═════════ -->

</div>

/* ═════════ 1. 카카오 OAuth — 정식 토큰 교환 ═════════
   인가코드(일회용) → 액세스토큰 → 회원번호(영구 고정)
   회원번호는 SHA-256 해시 후 uid로만 사용, 원본·토큰 저장 안 함 */
async function sha256Uid(kakaoId){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(HASH_SALT + kakaoId));
  return [...new Uint8Array(buf)].slice(0,16).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function exchangeKakaoCode(code){
  const tokenRes = await fetch('https://kauth.kakao.com/oauth/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=utf-8' },
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      client_id: KAKAO_KEY,
      redirect_uri: REDIRECT_URI,
      code
    })
  });
  const tok = await tokenRes.json();
  if (!tok.access_token) throw new Error('token_exchange_failed: ' + (tok.error_description || tok.error || ''));

  const meRes = await fetch('https://kapi.kakao.com/v2/user/me', {
    headers: { Authorization: 'Bearer ' + tok.access_token }
  });
  const me = await meRes.json();
  if (!me.id) throw new Error('user_me_failed');
  // 토큰은 여기서 폐기(저장 안 함). 회원번호도 해시 후 즉시 버림.
  return await sha256Uid(String(me.id));
}

async function init(){
  // Firestore Rules의 request.auth != null 검증용 (익명 인증 병행)
  try { await signInAnonymously(fbAuth); } catch(e){ console.warn('anon auth:', e); }

  // ① 카카오 redirect로 돌아온 경우
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  if (code) {
    history.replaceState({}, '', location.pathname);
    showError('로그인 처리 중...');
    try {
      uid = await exchangeKakaoCode(code);
      localStorage.setItem('dg_uid', uid);
      showError('');
    } catch(e) {
      console.error(e);
      showError('카카오 로그인에 실패했어요. 다시 시도해주세요.');
      return;
    }
  } else {
    // ② 저장된 세션
    uid = localStorage.getItem('dg_uid');
  }

  if (!uid) { showStep('stepLogin'); return; }

  // ③ 소속 방 확인 — 기기 저장(localStorage) 우선, 없으면 서버(users/{uid})에서 조회
  //    → 새 기기에서 로그인해도 내 방으로 바로 입장
  let savedRoom = localStorage.getItem('dg_room');
  if (!savedRoom) {
    try {
      const userSnap = await getDoc(doc(db,'users',uid));
      if (userSnap.exists() && userSnap.data().roomId) savedRoom = userSnap.data().roomId;
    } catch(e){ console.warn(e); }
  }
  if (savedRoom) {
    try {
      const memSnap = await getDoc(doc(db,'rooms',savedRoom,'members',uid));
      if (memSnap.exists()) {
        const roomSnap = await getDoc(doc(db,'rooms',savedRoom));
        if (roomSnap.exists()) {
          const r = roomSnap.data(), m = memSnap.data();
          roomId = savedRoom; roomName = r.name; roomCode = savedRoom;
          myNick = m.nick; myRole = m.role;
          localStorage.setItem('dg_room', savedRoom);
          enterApp();
          return;
        }
      }
      localStorage.removeItem('dg_room');
    } catch(e){ console.warn(e); }
  }
  showStep('stepRoom');
}

/* 초대코드 = 방 문서 ID 자체 (12자리)
   → rooms 컬렉션 목록 조회(list)가 필요 없어져서 Rules로 완전 차단 가능
   → 코드를 모르면 방의 존재 자체를 알 수 없음 ("링크 아는 사람만" 방식) */
function genCode(){
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; // 헷갈리는 I,L,O,0,1 제외
  let c = '';
  const rand = new Uint8Array(12);
  crypto.getRandomValues(rand);
  for (const r of rand) c += chars[r % chars.length];
  return c;
}

async function handleJoin(){
  const code = $('codeInput').value.trim().toUpperCase();
  const nick = $('joinNickInput').value.trim();
  if (!code) { showError('초대코드를 입력해주세요'); return; }
  if (!nick) { showError('닉네임을 입력해주세요'); return; }
  const btn = $('joinBtn'); btn.disabled = true;
  showError('확인 중...');
  try {
    // 코드 = 방 ID → 목록 검색 없이 정확한 주소로만 조회 (list 차단 가능)
    const roomSnap = await getDoc(doc(db,'rooms',code));
    if (!roomSnap.exists()) { showError('올바르지 않은 초대코드예요 🚫'); btn.disabled = false; return; }

    // 닉네임 중복 체크 (같은 방 안에서 — 방 ID를 아는 멤버만 조회 가능)
    const dupQ = query(collection(db,'rooms',code,'members'), where('nick','==',nick), limit(1));
    const dupSnaps = await getDocs(dupQ);
    if (!dupSnaps.empty && dupSnaps.docs[0].id !== uid) {
      showError('이미 사용 중인 닉네임이에요 🙏'); btn.disabled = false; return;
    }

    await setDoc(doc(db,'rooms',code,'members',uid), {
      nick, role: 'member', joinedAt: serverTimestamp()
    }, { merge: true });
    await setDoc(doc(db,'users',uid), { roomId: code });  // 어느 기기서든 내 방 찾기용

    roomId = code; roomName = roomSnap.data().name; roomCode = code;
    myNick = nick; myRole = 'member';
    localStorage.setItem('dg_room', roomId);
    enterApp();
  } catch(e) {
    console.error(e);
    showError('입장에 실패했어요. 잠시 후 다시 시도해주세요.');
    btn.disabled = false;
  }
}

  if (curMonth < 0){ curMonth = 11; curYear--; }
  selectedDate = null;
  $('dayPanel').style.display = 'none';

  subscribeMonth(curYear, curMonth);
  renderCal();
}

/* 투표 구독 — 월 이동 시 이전 구독 전부 해제 (누적 방지) */
function subscribeMonth(y, m){
  voteUnsubs.forEach(u => u());
  voteUnsubs = [];
  voteData = {};
  const days = new Date(y, m+1, 0).getDate();
  for (let d = 1; d <= days; d++){
    const key = dk(y, m, d);
    if (!GAMES[key]) continue;
    const unsub = onSnapshot(doc(db,'rooms',roomId,'votes',key), snap => {
      voteData[key] = snap.exists() ? snap.data() : { attendees: {} };
      renderCal();
      if (selectedDate === key) renderPanel(key);
    });
    voteUnsubs.push(unsub);
  }
}

function attendeesOf(key){
  const map = voteData[key]?.attendees || {};
  return Object.entries(map); // [ [uid, nick], ... ]
}

/* ═════════ 5. 캘린더 렌더링 ═════════ */
function renderCal(){
  $('calTitle').textContent = `${curYear}년 ${curMonth+1}월`;
  const g = $('calGrid');
  g.textContent = '';
  DOW.forEach(d => { const e = document.createElement('div'); e.className='dow'; e.textContent=d; g.appendChild(e); });
  const today = new Date();
  const first = new Date(curYear, curMonth, 1).getDay();
  const days = new Date(curYear, curMonth+1, 0).getDate();
  for (let i=0;i<first;i++){ const e=document.createElement('div'); e.className='day empty'; g.appendChild(e); }
  for (let d=1; d<=days; d++){
    const key = dk(curYear, curMonth, d);
    const game = GAMES[key];
    const dow = new Date(curYear, curMonth, d).getDay();
    const isToday = today.getFullYear()===curYear && today.getMonth()===curMonth && today.getDate()===d;
    const el = document.createElement('div');
    let cls = 'day';
    if (dow===0) cls += ' sun';
    if (dow===6) cls += ' sat';
    if (game) cls += ' has-game';
    if (isToday) cls += ' today';
    if (selectedDate===key) cls += ' selected';
    el.className = cls;

    const num = document.createElement('div');
    num.className = 'day-num'; num.textContent = d;
    el.appendChild(num);

    if (game){
      const tag = document.createElement('div');
      tag.className = 'gtag' + (game.special ? ' special' : game.away ? ' away' : '');
      tag.textContent = (game.special ? '⭐' : game.away ? '@' : 'vs') + game.opp;
      el.appendChild(tag);
      const atts = attendeesOf(key);
      if (atts.length){
        const dots = document.createElement('div');
        dots.className = 'dots';
        atts.forEach(() => { const dot=document.createElement('div'); dot.className='dot'; dots.appendChild(dot); });
        el.appendChild(dots);
      }
      el.addEventListener('click', () => { selectedDate = key; renderCal(); renderPanel(key); });
    }
    g.appendChild(el);
  }
}

/* ═════════ 6. 경기 패널 (투표 + 채팅) — 전부 DOM API, XSS 안전 ═════════ */
function renderPanel(key){
  const game = GAMES[key];
  if (!game) return;
  const panel = $('dayPanel');
  panel.style.display = 'block';
  panel.textContent = '';

  const atts = attendeesOf(key);
  const isAtt = atts.some(([auid]) => auid === uid);
  const [y,m,d] = key.split('-');

  // 헤더
  const hdr = document.createElement('div'); hdr.className = 'panel-hdr';
  const title = document.createElement('div'); title.className = 'panel-title';
  title.textContent = `${parseInt(m)}월 ${parseInt(d)}일`;
  const ginfo = document.createElement('div'); ginfo.className = 'panel-game';
  ginfo.textContent = '⚾ ' + (game.special ? '⭐ ' : game.away ? '원정 @ ' : 'vs ') + game.opp + ' · ' + game.time;
  hdr.append(title, ginfo);

  // 바디
  const body = document.createElement('div'); body.className = 'panel-body';

  const abtn = document.createElement('button');
  abtn.className = 'abtn' + (isAtt ? ' cancel' : '');
  abtn.textContent = isAtt ? '✕ 취소할게요' : '⚾ 직관 갈게요!';
  abtn.addEventListener('click', () => toggleAttend(key, isAtt, abtn));
  body.appendChild(abtn);

  if (atts.length){
    const label = document.createElement('div'); label.className = 'att-label';
    const strong = document.createElement('strong'); strong.textContent = `${atts.length}명`;
    label.append('직관 가는 멤버 ', strong);
    const chips = document.createElement('div'); chips.className = 'att-chips';
    atts.forEach(([, nick]) => {
      const c = document.createElement('div'); c.className = 'chip';
      c.textContent = '✓ ' + nick;  // uid는 화면에 노출하지 않음
      chips.appendChild(c);
    });
    body.append(label, chips);
  }

  // 채팅
  const chatWrap = document.createElement('div'); chatWrap.className = 'chat-wrap';
  if (!isAtt){
    const locked = document.createElement('div'); locked.className = 'locked';
    locked.textContent = '🔒 직관 투표한 멤버만 채팅할 수 있어요';
    chatWrap.appendChild(locked);
    if (chatUnsub){ chatUnsub(); chatUnsub = null; }
  } else {
    const clabel = document.createElement('div'); clabel.className = 'chat-label';
    clabel.textContent = '💬 직관 채팅';
    const msgs = document.createElement('div'); msgs.className = 'chat-msgs'; msgs.id = 'chatMsgs';
    const loading = document.createElement('div');
    loading.style.cssText = 'font-size:12px;color:#aaa'; loading.textContent = '채팅 불러오는 중...';
    msgs.appendChild(loading);
    const row = document.createElement('div'); row.className = 'cinput-row';
    const input = document.createElement('input');
    input.type = 'text'; input.id = 'chatInput'; input.placeholder = '메시지 입력...'; input.maxLength = 300;
    input.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(key); });
    const send = document.createElement('button'); send.className = 'csend'; send.textContent = '전송';
    send.addEventListener('click', () => sendChat(key));
    row.append(input, send);
    chatWrap.append(clabel, msgs, row);
  }
  body.appendChild(chatWrap);

  panel.append(hdr, body);
  if (isAtt) subscribeChat(key);
}

/* 투표 — attendees 맵 + merge (동시 투표 충돌 방지) */
async function toggleAttend(key, isAtt, btn){
  btn.disabled = true;
  try {
    const ref = doc(db,'rooms',roomId,'votes',key);
    await setDoc(ref, {
      attendees: { [uid]: isAtt ? deleteField() : myNick }
    }, { merge: true });
  } catch(e) {
    console.error(e);
    toast('저장에 실패했어요. 다시 시도해주세요.');
    btn.disabled = false;
  }
}

/* 채팅 */
function subscribeChat(key){
  if (chatUnsub){ chatUnsub(); chatUnsub = null; }
  const q = query(collection(db,'rooms',roomId,'chats',key,'messages'), orderBy('ts'), limit(200));
  chatUnsub = onSnapshot(q, snap => {
    const el = $('chatMsgs');
    if (!el) return;
    el.textContent = '';
    if (snap.empty){
      const empty = document.createElement('div');
      empty.style.cssText = 'font-size:12px;color:#aaa';
      empty.textContent = '아직 채팅이 없어요. 먼저 말 걸어보세요!';
      el.appendChild(empty);
      return;
    }
    snap.docs.forEach(dSnap => {
      const c = dSnap.data();
      const isMe = c.uid === uid;
      const msg = document.createElement('div'); msg.className = 'cmsg';
      const av = document.createElement('div'); av.className = 'cav' + (isMe ? ' me' : '');
      av.textContent = (c.nick || '?').slice(0,2);
      const box = document.createElement('div');
      const name = document.createElement('div'); name.className = 'cname'; name.textContent = c.nick || '';
      const bubble = document.createElement('div'); bubble.className = 'cbubble';
      bubble.textContent = c.text || '';   // textContent — XSS 원천 차단
      box.append(name, bubble);
      msg.append(av, box);
      el.appendChild(msg);
    });
    el.scrollTop = el.scrollHeight;
  });
}

async function sendChat(key){
  const input = $('chatInput');
  const text = input?.value.trim();
  if (!text) return;
  input.value = '';
  try {
    await addDoc(collection(db,'rooms',roomId,'chats',key,'messages'), {
      uid, nick: myNick, text, ts: serverTimestamp()
    });
  } catch(e) {
    console.error(e);
    toast('전송에 실패했어요.');
    input.value = text;
  }
}

function startClock(){
  const timeEl = $('clockTime'), msEl = $('clockMs'), dateEl = $('clockDate');
  function tick(){
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    timeEl.textContent = `${hh}:${mm}:${ss}`;
    msEl.textContent = '.' + String(now.getMilliseconds()).padStart(3,'0');
    dateEl.textContent = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${DOW[now.getDay()]})`;
    clockRaf = requestAnimationFrame(tick);
  }
  tick();
}

$('ticketlinkBtn').addEventListener('click', () => {
  window.open('https://www.ticketlink.co.kr/sports/baseball/62', '_blank', 'noopener');
});

init();
</script>
